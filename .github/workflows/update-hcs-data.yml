name: Update HCS Data

on:
  schedule:
    # Run daily at 6 PM UTC (12 hours after main workflow)
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-fetch all HCS data (ignore existing)'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-hcs:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: prod
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Fetch HCS data from Hedera Mirror Node
        run: |
          cd scripts
          FORCE="${{ github.event.inputs.force == 'true' && '--force' || '' }}"
          python run_pipeline.py --fetch --hcs-only $FORCE
        env:
          HEDERA_MIRROR_URL: https://mainnet-public.mirrornode.hedera.com

      - name: Transform data
        run: |
          cd scripts
          python run_pipeline.py --transform

      - name: Upload to Dune
        run: |
          cd scripts
          python run_pipeline.py --upload
        env:
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
          DUNE_USERNAME: ${{ secrets.DUNE_USERNAME }}

      - name: Commit updated data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "=== Files in data directory ==="
          ls -la data/ || echo "data/ directory not found"
          echo "=== Git status ==="
          git status --short
          git add -f data/hcs_daily_stats.csv 2>/dev/null || true
          git add -f data/.hcs_fetch_state.json 2>/dev/null || true
          echo "=== Staged changes ==="
          git diff --staged --stat || echo "No staged changes"
          git diff --staged --quiet || git commit -m "Update HCS data $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hcs-pipeline-data
          path: data/
          retention-days: 7
