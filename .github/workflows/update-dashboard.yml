name: Update Dune Dashboard

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      skip_hcs:
        description: 'Skip HCS message fetching'
        required: false
        default: 'true'
        type: boolean
      force:
        description: 'Force re-fetch all data (ignore existing)'
        required: false
        default: 'false'
        type: boolean

env:
  # Opt into Node.js 24 for GitHub Actions (Node.js 20 deprecated June 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: prod
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Fetch data from Hedera Mirror Node
        run: |
          cd scripts
          # For scheduled runs or when skip_hcs is true, skip HCS fetching
          # This allows transaction backfill to complete before adding HCS
          SKIP_HCS="${{ github.event.inputs.skip_hcs != 'false' && '--skip-hcs' || '' }}"
          FORCE="${{ github.event.inputs.force == 'true' && '--force' || '' }}"
          python run_pipeline.py --fetch $SKIP_HCS $FORCE
        env:
          HEDERA_MIRROR_URL: https://mainnet-public.mirrornode.hedera.com

      - name: Transform data
        run: |
          cd scripts
          python run_pipeline.py --transform

      - name: Upload to Dune
        run: |
          cd scripts
          python run_pipeline.py --upload
        env:
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
          DUNE_USERNAME: ${{ secrets.DUNE_USERNAME }}

      - name: Commit updated data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Debug: show what files exist and their status
          echo "=== Files in data directory ==="
          ls -la data/ || echo "data/ directory not found"
          echo "=== Git status ==="
          git status --short
          # Add data files (use -f to add even if in .gitignore)
          git add -f data/hedera_daily_stats.csv || true
          git add -f data/hcs_daily_stats.csv 2>/dev/null || true
          git add -f data/.fetch_state.json 2>/dev/null || true
          git add -f data/.hcs_fetch_state.json 2>/dev/null || true
          echo "=== Staged changes ==="
          git diff --staged --stat || echo "No staged changes"
          # Commit if there are changes
          git diff --staged --quiet || git commit -m "Update dashboard data $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-data
          path: data/
          retention-days: 7
