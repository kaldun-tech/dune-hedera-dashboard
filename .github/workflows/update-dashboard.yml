name: Update Dune Dashboard

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      skip_hcs:
        description: 'Skip HCS message fetching'
        required: false
        default: 'true'
        type: boolean
      force:
        description: 'Force re-fetch all data (ignore existing)'
        required: false
        default: 'false'
        type: boolean

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Fetch data from Hedera Mirror Node
        run: |
          cd scripts
          python run_pipeline.py --fetch ${{ github.event.inputs.skip_hcs == 'true' && '--skip-hcs' || '' }} ${{ github.event.inputs.force == 'true' && '--force' || '' }}
        env:
          HEDERA_MIRROR_URL: https://mainnet-public.mirrornode.hedera.com

      - name: Transform data
        run: |
          cd scripts
          python run_pipeline.py --transform

      - name: Upload to Dune
        run: |
          cd scripts
          python run_pipeline.py --upload
        env:
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
          DUNE_USERNAME: ${{ secrets.DUNE_USERNAME }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          git diff --staged --quiet || git commit -m "Update dashboard data $(date -u +%Y-%m-%d)"
          git push

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-data
          path: data/
          retention-days: 7
